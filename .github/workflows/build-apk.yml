name: Build SmartMow APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Build APK via EAS
        run: eas build -p android --profile preview --non-interactive --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Get APK download URL
        id: apk_url
        run: |
          URL=$(eas build:list --json --non-interactive --limit 1 | jq -r '.[0].artifacts.buildUrl')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Download APK
        run: curl -L "${{ steps.apk_url.outputs.url }}" -o SmartMow-v${{ github.run_number }}.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartMow-APK-v${{ github.run_number }}
          path: SmartMow-v${{ github.run_number }}.apk
          retention-days: 30
